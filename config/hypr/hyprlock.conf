general {
    hide_cursor = true
    no_fade_in = false
    disable_loading_bar = true
}

background {
    monitor =
    color = rgb(000000)
}

label {
    monitor =
    text = $TIME
    color = rgb(e8e8e8)
    font_size = 72
    font_family = sans
    position = 0, 80
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 280, 48
    outline_thickness = 1
    dots_size = 0.20
    dots_spacing = 0.30
    dots_center = true
    outer_color = rgb(d8dadd)
    inner_color = rgb(111315)
    font_color = rgb(e8e8e8)
    fade_on_empty = false
    placeholder_text = <i>Password...</i>
    hide_input = false
    position = 0, -40
    halign = center
    valign = center
}
